name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # TypeScript/Node.js build, lint, type-check
  typescript-tests:
    name: TypeScript Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-latest, macos-latest]
        # Node 18 is EOL (2025-04) and below eslint@10's engines floor
        # (^20.19 || ^22.13 || >=24); keep the matrix to supported majors.
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run build

      - name: Run TypeScript linter
        run: npm run lint:ts

      - name: Type-check TypeScript tests
        run: npm run test:ts

  # Python tests
  python-tests:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # pcbnew/kipy are KiCAD-bundled and mocked in tests/conftest.py;
          # requirements-dev.txt covers the rest (incl. kicad-skip, sexpdata).

      - name: Run Black formatter check
        run: black --check python/

      - name: Run flake8
        run: flake8 python/

      - name: Run MyPy type checker
        run: mypy python/

      - name: Run pytest
        run: pytest tests/ --cov=python --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-24.04'

  # Code quality checks (lint + format + audit)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/

      - name: Run Prettier check
        run: npx prettier --check "src/**/*.ts"

      - name: Check for high-severity vulnerabilities
        run: npm audit --audit-level=high

  # Documentation check
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: test -f README.md

      - name: Validate JSON files
        run: |
          set -e
          while IFS= read -r f; do
            python3 -m json.tool "$f" > /dev/null
            echo "✓ $f"
          done < <(find . -name "*.json" -not -path "./node_modules/*" -not -path "./dist/*")
